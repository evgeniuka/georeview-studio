name: CI

# Static checks that need no data store. GeoReview Studio is stdlib-only, so there
# is nothing to install for the app itself. The full functional suites
# (tests/validate_app.py and tests/test_api_contract.py = 183 endpoint checks)
# depend on the local analysis_output artifact store (~2.2 GB, intentionally not
# committed; a ~2 MB demo subset ships in demo_data/), so they are run locally via
# scripts/validate.ps1 + scripts/test_api_contract.ps1, not in this workflow.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev tools
        run: python -m pip install --upgrade ruff pytest

      - name: Lint (ruff)
        run: ruff check .

      - name: Byte-compile all modules
        run: python -m compileall -q backend tests scripts

      - name: Unit tests (no data store required)
        run: pytest tests/unit
